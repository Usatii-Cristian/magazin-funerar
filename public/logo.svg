<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="98" fill="white"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#1c1c1c" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="89" fill="none" stroke="#1c1c1c" stroke-width="1.5"/>

  <!-- Top arc path for curved text (clockwise through top) -->
  <path id="arc-top" d="M 17,100 A 83,83 0 0,1 183,100" fill="none"/>
  <text fill="#1c1c1c" font-family="Georgia,'Times New Roman',serif" font-size="12" letter-spacing="2.2" font-weight="normal">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">PrimNord-Granit</textPath>
  </text>

  <!-- Left ornament: diamond + line -->
  <polygon points="20,97 23.5,93.5 27,97 23.5,100.5" fill="#1c1c1c"/>
  <line x1="27" y1="97" x2="40" y2="97" stroke="#1c1c1c" stroke-width="1.2"/>

  <!-- Right ornament: line + diamond -->
  <line x1="160" y1="97" x2="173" y2="97" stroke="#1c1c1c" stroke-width="1.2"/>
  <polygon points="180,97 176.5,93.5 173,97 176.5,100.5" fill="#1c1c1c"/>

  <!-- N monogram — behind, stone-gray -->
  <text x="70" y="122" fill="#aaa098" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="bold">N</text>

  <!-- P monogram — front left, dark -->
  <text x="27" y="122" fill="#1c1c1c" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="bold">P</text>

  <!-- G monogram — front right, dark -->
  <text x="112" y="122" fill="#1c1c1c" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="bold">G</text>

  <!-- Horizontal divider with center diamond -->
  <line x1="38" y1="132" x2="93" y2="132" stroke="#1c1c1c" stroke-width="0.9"/>
  <polygon points="100,127 103.5,132 100,137 96.5,132" fill="#1c1c1c"/>
  <line x1="107" y1="132" x2="162" y2="132" stroke="#1c1c1c" stroke-width="0.9"/>

  <!-- Tagline -->
  <text x="100" y="150" text-anchor="middle" fill="#1c1c1c" font-family="Georgia,serif" font-size="8" letter-spacing="1.5" font-weight="bold">CALITATE ÎN PIATRĂ,</text>
  <text x="100" y="164" text-anchor="middle" fill="#1c1c1c" font-family="Georgia,serif" font-size="8" letter-spacing="1.5" font-weight="bold">DURABILITATE ÎN TIMP</text>

  <!-- Bottom diamond -->
  <polygon points="100,174 103.5,170 107,174 103.5,178" fill="#1c1c1c"/>
</svg>
